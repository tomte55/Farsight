name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release

jobs:
  build:
    runs-on: windows-latest
    # The account-server package pulls @prisma/client, whose postinstall runs
    # `prisma generate` and downloads a query engine. This release only builds the
    # two Electron installers (which never use Prisma), so skip that generate — it
    # would otherwise slow/flake the build on a binaries.prisma.sh download it
    # doesn't need. (Native builds like argon2 still run; only Prisma's is skipped.)
    env:
      PRISMA_SKIP_POSTINSTALL_GENERATE: '1'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history + tags, so the changelog can diff against the previous tag

      - uses: actions/setup-node@v6
        with:
          node-version: 22   # active LTS; electron-builder 24.x builds fine on it

      - name: Install dependencies
        run: npm ci

      - name: Set app version from tag
        id: ver
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # v2.0+: one unified app. The old @farsight/host is retired and no longer built.
          npm pkg set version="$VERSION" -w @farsight/controller

      # To enable Windows code signing: add repo secrets CSC_LINK (base64 of your .pfx)
      # and CSC_KEY_PASSWORD, then add an env: block with those two vars to the build
      # step below. Do NOT wire the env unconditionally — electron-builder 24.x fails on an
      # empty CSC_LINK, so the vars must only be present once the secrets actually exist.
      - name: Build Farsight installer
        run: npm run dist -w @farsight/controller

      - name: List built artifacts
        shell: bash
        run: ls -la packages/controller/dist || true

      - name: Generate changelog
        shell: bash
        run: |
          CURRENT="${GITHUB_REF_NAME}"
          # Previous tag by version order (the entry right after CURRENT in the desc-sorted list).
          PREV=$(git tag --sort=-v:refname | grep -A1 "^${CURRENT}$" | tail -1)
          {
            echo "## What's changed"
            echo
            if [ -n "$PREV" ] && [ "$PREV" != "$CURRENT" ]; then
              git log --no-merges --pretty=format:'- %s (%h)' "${PREV}..${CURRENT}"
              echo
              echo
              echo "**Full changelog:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${CURRENT}"
            else
              echo "- Initial release."
            fi
            echo
            echo "---"
            echo
            echo "### Download"
            echo "- **Farsight** — one app that controls other machines, lets you host (be controlled), and transfers files. Install it on every machine."
            echo
            echo '**Upgrading from v1?** v2 is a fresh install with a new identity, so it will not auto-update from the old Farsight Host / Farsight Controller — download and run the installer once. The old apps can be uninstalled.'
            echo
            echo 'Unsigned build: on first run Windows SmartScreen may warn ("More info" → "Run anyway").'
          } > RELEASE_BODY.md
          echo "----- generated release body -----"
          cat RELEASE_BODY.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Farsight ${{ github.ref_name }}
          body_path: RELEASE_BODY.md
          files: |
            packages/controller/dist/*.exe
            packages/controller/dist/latest.yml
            packages/controller/dist/*.blockmap
          fail_on_unmatched_files: true
