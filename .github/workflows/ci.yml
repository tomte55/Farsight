name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    env:
      # Skip @prisma/client's auto-generate during `npm ci` (a query-engine
      # download that can flake); we generate it explicitly below instead, so the
      # step is visible and fails loudly if it can't.
      PRISMA_SKIP_POSTINSTALL_GENERATE: '1'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      # The account-server tests import a Prisma client that must be generated
      # from its schema; without this they fail with "Cannot find module
      # '.prisma/client/default'". (release.yml skips this because it only builds
      # the Electron installers, which never touch Prisma — a test run does.)
      - name: Generate Prisma client (account-server tests need it)
        run: npm run prisma:generate -w @farsight/account-server
      - name: Run unit tests
        run: npx vitest run

  # Real-wire, headless, two-process transfer harness (Plan 1b). This runs the
  # ACTUAL packaged transfer stack (two real Electron processes, real WebRTC
  # data channels, real loopback signaling) rather than vitest's faked-wire
  # unit tests, so it's a separate job, not folded into `test` above.
  # See packages/controller/test/harness-spike/two-process-harness.mjs.
  # Confirmed green on windows-latest: the harness delivers a 4-flow, multi-file
  # transfer byte-identical over real WebRTC. A REQUIRED gate — a real transfer
  # regression (e.g. an F-B10-class OFFER drop) fails CI, not just the unit suite.
  # The harness has a built-in retry-once for transient real-WebRTC/ICE hiccups.
  real-wire:
    runs-on: windows-latest
    env:
      # The harness never touches account-server/Prisma — skip that install
      # cost entirely for this job.
      PRISMA_SKIP_POSTINSTALL_GENERATE: '1'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      # CRITICAL, was missing: `npm ci` does NOT run the `prestart`/`predist`
      # lifecycle hooks (those only fire on `npm start`/`npm run dist`), so
      # packages/controller/src/shared/ (gitignored; the sandboxed renderer's
      # importmap target for every @farsight/shared/* import) never gets
      # created on a fresh checkout. Without it, renderer.js's very first
      # import 404s and the WHOLE module silently never executes — no
      # window.__farsightShellReady, no console-message event either (CLAUDE.md:
      # Electron doesn't fire console-message for an ES-module resolution
      # failure), so every later poll just times out with zero explanation.
      # Reproduced locally by deleting the (locally already-vendored)
      # packages/controller/src/shared/ and re-running the harness: identical
      # failure signature (only "controller starting" + the panic-hotkey
      # warning, then a silent pollEval timeout on __farsightShellReady). This
      # step is exactly the app's own prestart hook, run explicitly since we
      # invoke Electron directly rather than via `npm start`.
      - name: Vendor @farsight/shared into the controller app
        run: node scripts/vendor-shared.mjs
      - name: Real-wire transfer harness (4-flow, multi-chunk, multi-file)
        run: node packages/controller/test/harness-spike/two-process-harness.mjs
        timeout-minutes: 10
      - name: Real-wire transfer harness (single-flow self-test, N=1)
        run: node packages/controller/test/harness-spike/two-process-harness.mjs
        timeout-minutes: 10
        env:
          SPIKE_FLOWS: '1'
      # Fault-injection reliability gate (Phase 3a Task 5, F-B11). Kills a LIVE
      # flow mid-transfer (dropped signaling socket / crashed worker renderer)
      # and the harness asserts THREE things, all in code (not just observed):
      # (1) the fault was SURFACED loud in the sender log, (2) the receiver
      # reaches a terminal outcome within timeout (never a silent zombie), AND
      # (3) that terminal outcome is 'completed' with byte-identical N/N
      # delivery — a terminal interrupted/failed/canceled, or any dropped file,
      # now FAILS the gate. (3) used to be logged as INFO only and never
      # asserted, which would have let the gate pass green on the exact
      # pre-Phase-3a stall-to-5/6-files bug; hardened as a review fix so the
      # gate can't silently regress. Confirmed locally: 5/5 for both fb1
      # (signaling drop) and fb2 (worker crash) at flowCount=4, each run
      # completing in well under a minute, under the hardened assertion.
      - name: Real-wire fault-injection harness (flow socket drop, F-B1)
        run: node packages/controller/test/harness-spike/transfer-fault-e2e.mjs
        timeout-minutes: 5
        env:
          SPIKE_SCENARIO: 'fb1'
          SPIKE_FLOWS: '4'
      - name: Real-wire fault-injection harness (worker crash, F-B2)
        run: node packages/controller/test/harness-spike/transfer-fault-e2e.mjs
        timeout-minutes: 5
        env:
          SPIKE_SCENARIO: 'fb2'
          SPIKE_FLOWS: '4'
