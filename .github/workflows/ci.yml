name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    env:
      # The account-server package's @prisma/client postinstall downloads a query
      # engine we don't need for unit tests (mirrors release.yml); skip it.
      PRISMA_SKIP_POSTINSTALL_GENERATE: '1'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npx vitest run
