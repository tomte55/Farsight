# infra/coturn/turnserver.conf
listening-port=3478
tls-listening-port=5349
fingerprint
use-auth-secret
static-auth-secret=REPLACE_WITH_TURN_SECRET
realm=turn.example.org
# Behind NAT, pin the LAN interface and advertise the public IP so relay
# candidates are reachable. deploy.sh fills these with the detected IPs:
#   listening-ip=<lan-ip>
#   relay-ip=<lan-ip>
#   external-ip=<public-ip>/<lan-ip>
# Relay port range (must be opened on the firewall):
min-port=49160
max-port=49200
# Reuse a Let's Encrypt cert for turns:
cert=/certs/turn.example.org.crt
pkey=/certs/turn.example.org.key
# Hardening:
no-cli
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
# R-1: quotas, short nonce lifetime, and no TCP relay to limit abuse.
total-quota=100
user-quota=6
bps-capacity=0
stale-nonce=600
no-tcp-relay
