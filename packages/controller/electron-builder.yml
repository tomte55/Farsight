# packages/controller/electron-builder.yml
appId: org.farsight.controller
productName: Farsight Controller
# Pinned so electron-builder doesn't need to resolve the hoisted (workspace) electron.
electronVersion: 33.4.11
# Space-free artifact name (productName has a space). Without this, the on-disk
# file, the feed url in latest-controller.yml, and the uploaded GitHub asset end up
# with three different names (spaces / dashes / dots) — electron-updater 404s on
# the download and the app shows "Couldn't check for updates." Guarded by
# test/artifact-name.test.js.
artifactName: Farsight-Controller-Setup-${version}.${ext}
directories: { output: dist }
win:
  target: nsis
  requestedExecutionLevel: asInvoker
files:
  # Shared modules are vendored into src/shared by scripts/vendor-shared.mjs
  # (predist), so the renderer resolves them via a stable relative path.
  - "src/**/*"
publish:
  provider: github
  owner: tomte55
  repo: Farsight
  channel: latest-controller
