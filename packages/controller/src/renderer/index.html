<!-- packages/controller/src/renderer/index.html -->
<!doctype html>
<meta charset="utf-8" />
<!--
  CSP: the real containment here is connect-src/object-src/base-uri/default-src
  (blocks a compromised renderer from exfiltrating to or navigating to
  arbitrary origins). 'unsafe-inline' is retained for script/style only
  because of the inline importmap below and pervasive inline style="..."
  attributes throughout this file; a hash/nonce-based tightening is a future
  improvement.
-->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' wss: ws:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'none'; form-action 'none'" />
<title>Farsight Controller</title>
<link rel="stylesheet" href="../shared/farsight.css" />
<!--
  Import map: resolve bare @farsight/shared/* specifiers to real source files
  (relative to this document) so the renderer works without a bundler.
-->
<script type="importmap">
{
  "imports": {
    "@farsight/shared/protocol": "../shared/protocol.js",
    "@farsight/shared/host-id": "../shared/host-id.js",
    "@farsight/shared/signaling-url": "../shared/signaling-url.js",
    "@farsight/shared/input-events": "../shared/input-events.js",
    "@farsight/shared/control-events": "../shared/control-events.js",
    "@farsight/shared/file-transfer": "../shared/file-transfer.js"
  }
}
</script>
<style>
  /* Video fills the window; connect card centers over the dark base. */
  #screen { position: fixed; inset: 0; display: none; background: #000; }
  #screen video { width: 100%; height: 100%; object-fit: contain; }
  #connect-wrap { min-height: 100vh; display: grid; place-items: center; }
  #connect { width: 340px; }
  #monitors {
    background: var(--panel); color: var(--ink); border: 1px solid var(--line);
    border-radius: 7px; padding: 5px 8px; font-size: 12.5px;
  }
</style>

<button id="settings-cog" class="cog" title="Settings" aria-label="Settings">⚙</button>
<div id="settings-menu" class="menu">
  <button id="menu-change-server">Change signaling server…</button>
  <button id="menu-check-updates">Check for updates</button>
  <button id="menu-open-logs">Open logs folder</button>
  <div id="menu-status" class="menu-status"></div>
</div>

<div id="update-banner">
  <span id="update-msg"></span>
  <a id="update-restart" href="#">Restart now</a>
</div>

<div id="setup" hidden style="min-height:100vh;display:grid;place-items:center">
  <div style="width:340px">
    <div class="wm"><div class="glyph">◆</div><div class="name">Farsight</div></div>
    <div style="font-size:15px;font-weight:700;margin-bottom:3px">Set up your signaling server</div>
    <div class="statusline" style="margin-top:0;margin-bottom:16px">Enter the address of your Farsight signaling server (wss://…).</div>
    <div class="lbl">Signaling server URL</div>
    <input id="signaling-url" class="input" placeholder="wss://signal.example.org" />
    <button id="save-signaling" class="btn btn-primary" style="width:100%;margin-top:4px">Save</button>
    <p id="setup-error" class="statusline" style="color:var(--danger-ink)"></p>
  </div>
</div>

<div id="connect-wrap" style="display:none">
  <div id="connect">
    <div class="wm"><div class="glyph">◆</div><div class="name">Farsight</div></div>
    <div style="font-size:15px;font-weight:700;margin-bottom:3px">Connect to a host</div>
    <div class="statusline" style="margin-top:0;margin-bottom:16px">Enter the ID and password shown on the host.</div>
    <div class="lbl">Host ID</div>
    <input id="host-id" class="input" placeholder="Host ID (9 digits)" />
    <div class="lbl">Password</div>
    <input id="host-pw" class="input" placeholder="Password (xxxx-xxxx-xxxx)" />
    <button id="go" class="btn btn-primary" style="width:100%;margin-top:4px">Connect</button>
    <p id="status" class="statusline"></p>
  </div>
</div>

<div id="screen">
  <div class="sessionbar">
    <span>Remote session</span>
    <span style="display:flex;gap:10px;align-items:center">
      <span id="quality" class="qstat"></span>
      <select id="monitors" style="display:none"></select>
      <button id="send-file" class="btn" style="padding:5px 10px">Send file…</button>
      <span id="file-status" class="qstat"></span>
      <button id="end" class="btn btn-danger" style="padding:5px 12px">Disconnect</button>
    </span>
  </div>
  <video id="video" autoplay playsinline></video>
</div>

<div id="overlay" class="overlay" hidden>
  <div class="veil"></div>
  <div class="toast">
    <div id="ov-glyph" class="glyphc"></div>
    <h2 id="ov-title"></h2>
    <p id="ov-detail"></p>
    <div id="ov-actions" class="row"></div>
  </div>
</div>
<script type="module" src="./error-reporter.js"></script>
<script type="module" src="./renderer.js"></script>
